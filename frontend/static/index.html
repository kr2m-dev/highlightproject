<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Highlight Extractor</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎬 Video Highlight Extractor</h1>
            <p class="subtitle">Extract automatic highlights from your videos using AI</p>
        </header>

        <main>
            <section class="upload-section">
                <h2>Upload Video</h2>
                
                <div class="upload-options">
                    <div class="option-tabs">
                        <button class="tab-btn active" data-tab="file">📁 Upload File</button>
                        <button class="tab-btn" data-tab="path">📂 Server Path</button>
                    </div>

                    <div class="tab-content active" id="file-tab">
                        <div class="file-drop-zone" id="dropZone">
                            <input type="file" id="videoFile" accept="video/*" hidden>
                            <label for="videoFile" class="drop-label">
                                <span class="drop-icon">🎥</span>
                                <span class="drop-text">Drag & drop or click to select video</span>
                                <span class="drop-hint">MP4, AVI, MOV, MKV, WebM</span>
                            </label>
                        </div>
                    </div>

                    <div class="tab-content" id="path-tab">
                        <div class="path-input-group">
                            <label for="videoPath">Server Path (absolute):</label>
                            <input type="text" id="videoPath" placeholder="C:\videos\my_video.mp4 or /home/user/videos/my_video.mp4">
                            <span class="path-hint">For AWS/server deployment - files already on server</span>
                        </div>
                    </div>
                </div>

                <div class="options-section">
                    <h3>Analysis Options</h3>
                    
                    <div class="option-group">
                        <label>
                            <input type="checkbox" id="enableVision" disabled>
                            <span>👁️ Visual Analysis (non disponible - modèle décommissionné)</span>
                        </label>
                        <label>
                            <input type="checkbox" id="enableTranscript" checked>
                            <span>🎤 Audio Transcription (Whisper) - Recommandé</span>
                        </label>
                    </div>

                    <div class="option-group">
                        <label for="visionInterval">Frame Interval (seconds):</label>
                        <input type="number" id="visionInterval" value="5" min="1" max="60">
                    </div>

                    <div class="option-group">
                        <label for="maxClips">Max Frames:</label>
                        <input type="number" id="maxClips" value="20" min="5" max="100">
                    </div>
                </div>

                <button class="analyze-btn" id="analyzeBtn">
                    <span class="btn-text">🚀 Start Analysis</span>
                </button>
            </section>

            <section class="progress-section" id="progressSection" style="display: none;">
                <h2>Analysis Progress</h2>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <p class="progress-message" id="progressMessage">Initializing...</p>
            </section>

            <section class="results-section" id="resultsSection" style="display: none;">
                <h2>Results</h2>
                
                <div class="stats-grid">
                    <div class="stat-card">
                        <span class="stat-value" id="durationValue">0s</span>
                        <span class="stat-label">Duration</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-value" id="framesValue">0</span>
                        <span class="stat-label">Frames</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-value" id="transcriptValue">0</span>
                        <span class="stat-label">Segments</span>
                    </div>
                    <div class="stat-card highlight">
                        <span class="stat-value" id="highlightsValue">0</span>
                        <span class="stat-label">Highlights</span>
                    </div>
                </div>

                <div class="highlights-list" id="highlightsList">
                    <!-- Highlights will be inserted here -->
                </div>

                <div class="export-section">
                    <button class="export-btn" id="exportJsonBtn">📥 Export JSON</button>
                </div>
            </section>
        </main>

        <footer>
            <p>Powered by Groq Vision & Whisper AI</p>
        </footer>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
